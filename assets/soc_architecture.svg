<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="790" viewBox="0 0 1440 790" role="img" aria-labelledby="title desc">
<title id="title">SOC Intelligence Command architecture</title><desc id="desc">Conceptual defensive SOC pipeline from fictional telemetry to normalized events, detections, anomaly evidence, prioritized incidents, analyst response playbooks, and auditable outputs.</desc>
<defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#07131f"/><stop offset="1" stop-color="#19334b"/></linearGradient><linearGradient id="cyan" x1="0" x2="1"><stop stop-color="#36d4d0"/><stop offset="1" stop-color="#659cff"/></linearGradient><linearGradient id="gold" x1="0" x2="1"><stop stop-color="#ffda72"/><stop offset="1" stop-color="#f9946a"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity=".32"/></filter><marker id="arr" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto"><path d="M0 0 L12 6 L0 12z" fill="#a8cfe5"/></marker><style>.h{font-family:Arial,Helvetica,sans-serif;font-size:34px;font-weight:700;fill:#f8fcff}.s{font-family:Arial,Helvetica,sans-serif;font-size:16px;fill:#bdd8e8}.t{font-family:Arial,Helvetica,sans-serif;font-size:18px;font-weight:700;fill:#f8fcff}.b{font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#c8dde8}.tiny{font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#9dbdce}.tag{font-family:Arial,Helvetica,sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;fill:#75e8df}.num{font-family:Arial,Helvetica,sans-serif;font-size:14px;font-weight:700;fill:#07131f}</style></defs>
<rect width="1440" height="790" fill="url(#bg)"/><circle cx="1290" cy="90" r="185" fill="#24536b" opacity=".28"/><circle cx="115" cy="760" r="220" fill="#08616d" opacity=".18"/>
<text x="70" y="76" class="h">SOC Intelligence Command: defensive detection-to-decision architecture</text><text x="70" y="108" class="s">Conceptual documentation diagram. Synthetic examples are fictional; real telemetry remains local, authorized, and uncommitted.</text><line x1="70" y1="140" x2="1370" y2="140" stroke="#2d5c76"/>
<g filter="url(#shadow)"><rect x="70" y="190" width="250" height="214" rx="18" fill="#123148" stroke="#37647e"/><rect x="94" y="214" width="42" height="26" rx="13" fill="url(#cyan)"/><text x="109" y="233" class="num">01</text><text x="94" y="274" class="t">Telemetry laboratory</text><text x="94" y="307" class="b">Identity and authentication</text><text x="94" y="333" class="b">Endpoint process records</text><text x="94" y="359" class="b">DNS and network events</text><text x="94" y="386" class="tiny">Synthetic now; authorized logs later</text></g>
<g filter="url(#shadow)"><rect x="390" y="190" width="250" height="214" rx="18" fill="#123148" stroke="#37647e"/><rect x="414" y="214" width="42" height="26" rx="13" fill="url(#cyan)"/><text x="429" y="233" class="num">02</text><text x="414" y="274" class="t">Normalize &amp; validate</text><text x="414" y="307" class="b">Canonical event schema</text><text x="414" y="333" class="b">Timestamp and entity fields</text><text x="414" y="359" class="b">Data-boundary checks</text><text x="414" y="386" class="tiny">No silent evidence fabrication</text></g>
<g filter="url(#shadow)"><rect x="710" y="190" width="250" height="214" rx="18" fill="#123148" stroke="#37647e"/><rect x="734" y="214" width="42" height="26" rx="13" fill="url(#cyan)"/><text x="749" y="233" class="num">03</text><text x="734" y="274" class="t">Detection evidence</text><text x="734" y="307" class="b">Transparent rules</text><text x="734" y="333" class="b">Host-hour anomaly evidence</text><text x="734" y="359" class="b">Rule-level explanations</text><text x="734" y="386" class="tiny">Detections support—not replace—review</text></g>
<g filter="url(#shadow)"><rect x="1030" y="190" width="340" height="214" rx="18" fill="#123148" stroke="#37647e"/><rect x="1054" y="214" width="42" height="26" rx="13" fill="url(#cyan)"/><text x="1069" y="233" class="num">04</text><text x="1054" y="274" class="t">Triage &amp; correlation</text><text x="1054" y="307" class="b">Risk score and analyst queue</text><text x="1054" y="333" class="b">Shared entity + timeline graph</text><text x="1054" y="359" class="b">Incident clustering</text><text x="1054" y="386" class="tiny">Correlation is evidence, not attribution</text></g>
<path d="M320 296 H382" stroke="#a8cfe5" stroke-width="3" marker-end="url(#arr)"/><path d="M640 296 H702" stroke="#a8cfe5" stroke-width="3" marker-end="url(#arr)"/><path d="M960 296 H1022" stroke="#a8cfe5" stroke-width="3" marker-end="url(#arr)"/>
<g filter="url(#shadow)"><rect x="120" y="520" width="350" height="178" rx="18" fill="#123d4a" stroke="#378f96"/><text x="146" y="555" class="tag">HUMAN REVIEW BOUNDARY</text><text x="146" y="592" class="t">Response playbooks</text><text x="146" y="623" class="b">Preserve evidence</text><text x="146" y="649" class="b">Verify authorization and context</text><text x="146" y="675" class="tiny">Containment requires analyst approval</text></g>
<g filter="url(#shadow)"><rect x="545" y="520" width="350" height="178" rx="18" fill="#3a3045" stroke="#8d70a5"/><text x="571" y="555" class="tag" fill="#ffdca0">RESEARCH EVALUATION</text><text x="571" y="592" class="t">Synthetic lab metrics</text><text x="571" y="623" class="b">Precision, recall, alert volume</text><text x="571" y="649" class="b">Mean time to detect</text><text x="571" y="675" class="tiny">Labels valid only in the synthetic laboratory</text></g>
<g filter="url(#shadow)"><rect x="970" y="520" width="350" height="178" rx="18" fill="#443824" stroke="#bc9050"/><text x="996" y="555" class="tag" fill="#ffe4a6">AUDITABLE OUTPUTS</text><text x="996" y="592" class="t">Figures, reports &amp; ledger</text><text x="996" y="623" class="b">Timeline, graph, priority charts</text><text x="996" y="649" class="b">Hash-chained experiment record</text><text x="996" y="675" class="tiny">Generated locally after execution</text></g>
<path d="M1200 404 C1200 460 1145 470 1145 510" fill="none" stroke="#ffd56d" stroke-width="3" marker-end="url(#arr)"/><path d="M1200 404 C1200 460 720 470 720 510" fill="none" stroke="#ffd56d" stroke-width="3" marker-end="url(#arr)"/><path d="M1200 404 C1200 460 295 470 295 510" fill="none" stroke="#ffd56d" stroke-width="3" marker-end="url(#arr)"/>
<text x="70" y="750" class="tiny">No auto-containment, credential reset, endpoint isolation, or network blocking is performed by this repository.</text>
</svg>
