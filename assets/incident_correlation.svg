<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="690" viewBox="0 0 1440 690" role="img" aria-labelledby="title desc">
<title id="title">Incident correlation logic</title><desc id="desc">Conceptual graph of alerts linked through shared user, host, source IP, and timeline context into an analyst-review incident.</desc>
<defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#fffaf4"/><stop offset="1" stop-color="#f0f8ff"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#32526a" flood-opacity=".16"/></filter><marker id="arr" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto"><path d="M0 0 L12 6 L0 12z" fill="#59768e"/></marker><style>.h{font-family:Arial,Helvetica,sans-serif;font-size:31px;font-weight:700;fill:#19334b}.s{font-family:Arial,Helvetica,sans-serif;font-size:16px;fill:#5c768b}.t{font-family:Arial,Helvetica,sans-serif;font-size:17px;font-weight:700;fill:#19334b}.b{font-family:Arial,Helvetica,sans-serif;font-size:13px;fill:#49657a}.small{font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#70879a}.white{font-family:Arial,Helvetica,sans-serif;font-size:13px;font-weight:700;fill:#fff}.tag{font-family:Arial,Helvetica,sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;fill:#287b94}</style></defs>
<rect width="1440" height="690" fill="url(#bg)"/><text x="70" y="70" class="h">Entity and timeline incident correlation</text><text x="70" y="102" class="s">Alerts become a reviewable incident only when the graph exposes shared context. A link is a triage clue—not attribution or certainty.</text><line x1="70" y1="132" x2="1370" y2="132" stroke="#d8e5ee"/>
<g filter="url(#shadow)"><rect x="78" y="190" width="260" height="340" rx="20" fill="#fff" stroke="#c5d8e4"/><text x="105" y="228" class="tag">RULE AND MODEL EVIDENCE</text><rect x="105" y="260" width="205" height="46" rx="11" fill="#3f8fb5"/><text x="126" y="289" class="white">AUTH-001 login burst</text><rect x="105" y="326" width="205" height="46" rx="11" fill="#6f78c9"/><text x="126" y="355" class="white">ID-001 privilege change</text><rect x="105" y="392" width="205" height="46" rx="11" fill="#cd7d92"/><text x="126" y="421" class="white">DNS-001 unusual name</text><rect x="105" y="458" width="205" height="46" rx="11" fill="#d39763"/><text x="126" y="487" class="white">NET-001 auth burst</text></g>
<g filter="url(#shadow)"><rect x="480" y="168" width="460" height="384" rx="25" fill="#183b52"/><text x="514" y="208" style="font-family:Arial,Helvetica,sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;fill:#73e1dc">CORRELATION GRAPH</text><circle cx="624" cy="300" r="52" fill="#55a9cb"/><text x="588" y="305" class="white">user: alex</text><circle cx="796" cy="292" r="56" fill="#54b5a4"/><text x="755" y="297" class="white">host: ws-03</text><circle cx="707" cy="430" r="54" fill="#8d75cb"/><text x="672" y="435" class="white">IP: .23</text><line x1="670" y1="298" x2="735" y2="294" stroke="#d1f0f0" stroke-width="4"/><line x1="646" y1="340" x2="687" y2="390" stroke="#d1f0f0" stroke-width="4"/><line x1="765" y1="342" x2="729" y2="388" stroke="#d1f0f0" stroke-width="4"/><rect x="540" y="486" width="340" height="38" rx="10" fill="#244f68"/><text x="561" y="511" style="font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#d5e8f2">Shared entities + temporal proximity + risk scores</text></g>
<path d="M338 360 H468" stroke="#59768e" stroke-width="3" marker-end="url(#arr)"/>
<path d="M940 360 H1030" stroke="#59768e" stroke-width="3" marker-end="url(#arr)"/>
<g filter="url(#shadow)"><rect x="1050" y="190" width="310" height="340" rx="20" fill="#fff" stroke="#c5d8e4"/><text x="1078" y="228" class="tag">ANALYST REVIEW INCIDENT</text><text x="1078" y="271" class="t">INC-001: linked activity</text><text x="1078" y="307" class="b">1. Preserve evidence</text><text x="1078" y="335" class="b">2. Verify business authorization</text><text x="1078" y="363" class="b">3. Review identity and endpoint context</text><text x="1078" y="391" class="b">4. Escalate containment decision</text><rect x="1078" y="434" width="252" height="62" rx="12" fill="#fff2dc"/><text x="1094" y="462" class="small">Automation boundary:</text><text x="1094" y="482" class="small">no isolation or credential reset</text></g>
<text x="70" y="618" class="small">The output graph is generated locally from the configured experiment and is designed for explainable triage review.</text>
</svg>
